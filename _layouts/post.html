---
layout: basic
---

<div>
  <h2 class="page-title">
    {{ page.title }}
  </h2>
  <span>
    {{ page.date | date_to_string }}
  </span>
  <small>
    {% for tag in page.tags %}
      <a class="tags" href="/tags/#{{tag | downcase}}">
        #{{tag | downcase}}</a>{% unless forloop.last %}{% endunless %}{% endfor %}
  </small>
  <div>━━━</div>
  <div>
    {{content}}
  </div>
</div>

<div>
  <br>
  <h2>Have feedback?</h2>
  <p>
    You can discuss this post on
    <a href="https://twitter.com/nikosbaxevanis">Twitter</a>,
    and propose changes on
    <a href="https://github.com/moodmosaic/blog/blob/master/{{page.path}}">
      GitHub</a>.
  </p>
</div>
